# Render Blueprint — single web service that serves both the NestJS API and the
# built Angular SPA from one public URL.
#
# Deploy: push this repo, then in Render → New → Blueprint → pick this repo.
# Render reads this file, creates the service, and prompts for the secret env
# vars marked `sync: false` (paste your keys there — they are never committed).
services:
  - type: web
    name: candidate-search
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm run render-build
    startCommand: npm run render-start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Port Render provides; the server reads process.env.PORT.
      - key: PORT
        value: "10000"
      # Ranking model (Claude Haiku — cheap & fast). Override if you like.
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      # --- Secrets: fill these in the Render dashboard (not committed) ---
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
