# Render Blueprint — single web service that serves both the NestJS API and the
# built Angular SPA from one public URL.
#
# Deploy: push this repo, then in Render → New → Blueprint → pick this repo.
# Render reads this file, creates the service, and prompts for the secret env
# vars marked `sync: false` (paste your keys there — they are never committed).
services:
  - type: web
    name: candidate-search
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm run render-build
    startCommand: npm run render-start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Port Render provides; the server reads process.env.PORT.
      - key: PORT
        value: "10000"
      # --- Secrets: fill in the Render dashboard (not committed) ---
      # LLM ranking — set ONE (app uses whichever is present):
      #   GEMINI_API_KEY = free, no card  (https://aistudio.google.com/apikey)
      #   ANTHROPIC_API_KEY = Claude, needs billing
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Web X-ray search — set ONE (optional; GitHub source works without any):
      #   SERPER_API_KEY = free 2500 queries, no card  (https://serper.dev/)
      #   SERPAPI_KEY = free tier ~100/mo
      - key: SERPER_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      # Optional: raises GitHub search rate limits.
      - key: GITHUB_TOKEN
        sync: false
